<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Interview - Voice Interview Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="setup-container">
    <h2 class="setup-title">Set Up Your Interview</h2>

    <div class="form-group">
      <label for="roleSelect">Select Role</label>
      <select id="roleSelect">
        <option value="software-engineer">Software Engineer</option>
        <option value="sales" disabled>Sales (coming soon)</option>
        <option value="customer-support" disabled>Customer Support (coming soon)</option>
        <option value="visa" disabled>Visa Consultant (coming soon)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="languageSelect">Select Language</label>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="de">German</option>
      </select>
    </div>

    <button id="beginBtn" class="primary-btn">Begin Interview</button>

    <p id="errorMsg" class="error-msg"></p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/setup.js"></script>
</body>
</html>
